memory-map:
  bus: apb-32
  name: multiflex_regs
  description: MultiFlex Protocol Control Registers
  children:
    - reg:
        name: ctrl
        description: control register
        width: 32
        access: rw
        children:
          - field:
              name: enable
              description: enable TX engine and wire clock
              range: 0
          - field:
              name: lanes_tx
              description: number of active TX lanes (1-31, must not exceed NUM_LANES_TX parameter)
              range: 5-1
          - field:
              name: lanes_rx
              description: number of active RX lanes (1-31, must not exceed NUM_LANES_RX parameter)
              range: 10-6
          - field:
              name: clk_div
              description: wire clock half-period in fabric cycles minus 1 (4 = 10 MHz at 100 MHz fabric)
              range: 18-11
          - field:
              name: loopback
              description: internal loopback -- ties TX output back to RX input for self-test
              range: 19

    - reg:
        name: status
        description: link status -- TX live bits update every cycle; sticky bits cleared via error_clr
        width: 32
        access: ro
        children:
          - field:
              name: tx_busy
              description: transmitter is active
              range: 0
          - field:
              name: tx_full
              description: TX FIFO full
              range: 1
          - field:
              name: tx_empty
              description: TX FIFO empty
              range: 2
          - field:
              name: tx_overflow
              description: sticky -- byte was dropped because TX FIFO was full on write
              range: 3
          - field:
              name: rx_locked
              description: RX has seen at least one valid sync pulse
              range: 8
          - field:
              name: rx_clk_timeout
              description: reserved -- no mfx_clk edges seen within watchdog window
              range: 9
          - field:
              name: rx_sync_lost
              description: sticky -- mfx_sync dropped unexpectedly mid-byte
              range: 10
          - field:
              name: rx_framing_err
              description: reserved -- symbol count did not align to byte boundary
              range: 11

    - reg:
        name: tx_data
        description: TX FIFO push -- write a byte to transmit (ignored if tx_full)
        width: 32
        access: rw
        children:
          - field:
              name: data
              description: byte to push into TX FIFO
              range: 7-0

    - reg:
        name: rx_data
        description: RX FIFO pop -- read returns oldest received byte; check rx_locked before reading
        width: 32
        access: ro
        children:
          - field:
              name: data
              description: received byte
              range: 7-0
          - field:
              name: valid
              description: 1 if data field contains a valid byte
              range: 8

    - reg:
        name: error_cnt
        description: saturating error counters -- cleared via error_clr
        width: 32
        access: ro
        children:
          - field:
              name: tx_drop_count
              description: number of TX bytes dropped due to FIFO full (saturates at 255)
              range: 7-0
          - field:
              name: rx_error_count
              description: number of RX pattern checker errors (saturates at 255)
              range: 15-8

    - reg:
        name: error_clr
        description: write 1 to a bit to clear the corresponding sticky status bit and/or counter
        width: 32
        access: rw
        children:
          - field:
              name: clr_tx
              description: clears tx_overflow status bit and tx_drop_count counter
              range: 0
          - field:
              name: clr_rx
              description: clears all RX error bits and rx_error_count counter
              range: 1

    - reg:
        name: tx_len
        description: number of bytes to transmit from tx_buf; writing a non-zero value triggers TX (ignored if tx_busy)
        width: 32
        access: rw
        children:
          - field:
              name: len
              description: byte count (0-2047)
              range: 10-0

    - reg:
        name: rx_count
        description: number of bytes currently in rx_buf available to read
        width: 32
        access: ro
        children:
          - field:
              name: count
              description: number of valid bytes in rx_buf (0-2047)
              range: 10-0

    - memory:
        name: tx_buf
        description: TX buffer -- firmware fills this then writes tx_len to trigger transmission
        memsize: 2048
        children:
          - reg:
              name: data
              access: wo
              width: 8

    - memory:
        name: rx_buf
        description: RX buffer -- hardware fills as bytes arrive; firmware reads rx_count then reads here
        memsize: 2048
        children:
          - reg:
              name: data
              access: ro
              width: 8
